name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - run: npm ci

      - name: Determine version bump
        id: bump
        run: |
          REMOTE=$(npm view @tomasward/whoop-cli version 2>/dev/null || echo "0.0.0")
          echo "remote=$REMOTE" >> "$GITHUB_OUTPUT"

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log "$RANGE" --pretty=format:"%s" 2>/dev/null || echo "")
          echo "--- Commits since last tag ---"
          echo "$COMMITS"

          if echo "$COMMITS" | grep -qE "^feat(\(.+\))?!:|BREAKING CHANGE"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?:"; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version from npm + bump
        if: steps.bump.outputs.type != 'none'
        id: version
        env:
          REMOTE: ${{ steps.bump.outputs.remote }}
          BUMP_TYPE: ${{ steps.bump.outputs.type }}
        run: |
          npm version "$REMOTE" --no-git-tag-version --allow-same-version
          npm version "$BUMP_TYPE" --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "new_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION (was $REMOTE, bump: $BUMP_TYPE)"

      - name: Publish
        if: steps.bump.outputs.type != 'none'
        run: npm publish --provenance

      - name: Create git tag
        if: steps.version.outputs.new_version != ''
        env:
          VERSION: ${{ steps.version.outputs.new_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
